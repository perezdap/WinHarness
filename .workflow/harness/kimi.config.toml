# Kimi Code enforcement, generated by PSWayforge.
# Kimi reads hooks ONLY from the GLOBAL ~/.kimi-code/config.toml
# (Windows: %USERPROFILE%\.kimi-code\config.toml). Add the entries below to
# that file. The command path is relative to the project Kimi runs in.

[[hooks]]
event = "PreToolUse"
matcher = "Bash|Edit|Write"
command = "pwsh -NoProfile -File .workflow/hooks/gate.ps1 -Stage pre-tool -AsHook kimi"
timeout = 60

[[permission.rules]]
decision = "deny"
pattern = "Edit(**/.env)"
scope = "project"

[[permission.rules]]
decision = "deny"
pattern = "Write(**/.env)"
scope = "project"

[[permission.rules]]
decision = "deny"
pattern = "Edit(**/.env.*)"
scope = "project"

[[permission.rules]]
decision = "deny"
pattern = "Write(**/.env.*)"
scope = "project"


