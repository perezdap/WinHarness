apiVersion: wayforge/v2
name: default
description: A minimal agent workflow - scout, plan, build - with a plan gate and a dotenv guardrail.

# File-glob sets referenced by gate `when:` predicates. The `code` scope matches
# source files by extension across any layout, and EXCLUDES (via `!`) Wayforge's
# own generated tree so scaffolding never demands a plan. Trim or extend the
# language list to match your project.
scopes:
  code:
    - "**/*.ps1"
    - "**/*.psm1"
    - "**/*.cs"
    - "**/*.fs"
    - "**/*.go"
    - "**/*.rs"
    - "**/*.java"
    - "**/*.kt"
    - "**/*.py"
    - "**/*.rb"
    - "**/*.php"
    - "**/*.ts"
    - "**/*.tsx"
    - "**/*.js"
    - "**/*.jsx"
    - "**/*.vue"
    - "**/*.svelte"
    - "**/*.c"
    - "**/*.cc"
    - "**/*.cpp"
    - "**/*.h"
    - "**/*.hpp"
    - "**/*.m"
    - "**/*.swift"
    - "**/*.scala"
    - "**/*.sql"
    # Exclude Wayforge's own machinery (it emits .ps1/.js/.ts files) so the
    # scaffold itself never triggers the plan gate.
    - "!.workflow/**"
    - "!.claude/**"
    - "!.codex/**"
    - "!.grok/**"
    - "!.cursor/**"
    - "!.opencode/**"
    - "!.pi/**"
    - "!.agents/**"
    - "!.github/hooks/**"
  docs:
    - "docs/**"
    - "**/*.md"

# Narrative process (guidance) - rendered into AGENTS.md.
steps:
  - id: scout
    name: Scout Context
    description: Read AGENTS.md, skills, and existing code to understand the task.
  - id: plan
    name: Plan
    description: Produce a plan artifact that defines the approach and acceptance criteria.
    outputs:
      - artifact: plan.json
        schema: plan
  - id: build
    name: Build
    description: Implement the plan and keep artifacts valid against their schemas.

# Enforced invariants (enforcement) - projected into harness hooks, git hooks, and CI.
gates:
  - id: plan-before-build
    description: Code changes require an approved valid plan artifact
    on:
      - pre-tool
      - pre-commit
    when: changes_touch(code)
    severity: block
    check:
      requires_artifact: plan.json
      schema: plan

  - id: no-edit-dotenv
    description: Never edit or commit dotenv files
    on:
      - pre-tool
      - pre-commit
      - ci
    when: always
    severity: block
    check:
      forbid:
        tool:
          - edit
          - write
        path:
          - "**/.env"
          - "**/.env.*"

